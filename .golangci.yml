version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errcheck
    - errname
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
  disable:
    - err113

  settings:
    errcheck:
      check-type-assertions: true
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 40
    nakedret:
      max-func-lines: 30
    gosec:
      excludes:
        - G104

  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - goconst
          - gocritic
          - unparam

run:
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
